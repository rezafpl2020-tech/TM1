name: Daily Scrape

# Daily cron for one of 10 worker repos (TM1..TM10). Template file; replace
# 05 with a unique minute per repo (05, 10, ..., 50) so 10 workers
# don't all start in the same instant.
#
# This workflow:
#   1. Checks its own quota usage, exits cleanly if ≥90%
#   2. Clones Transfermarket-coord/tm-control (public) for shared scraper code + assignments
#   3. Reads assignments.json → picks this worker's competitions
#   4. Runs dcaribou scraper for the CURRENT season only (2025)
#   5. Writes JSONL output to data/{comp_id}/{season}/*.jsonl
#   6. Updates status.json with minutes consumed
#   7. Commits + pushes

on:
  schedule:
    - cron: '05 2 * * *'     # 02:XX UTC daily
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Ignore hibernation + quota guards'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: scrape-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      SEASON:            '2025'
      DCARIBOU_IMAGE:    dcaribou/transfermarkt-scraper:main
      TM_CONTROL_REPO:   https://github.com/Transfermarket-coord/tm-control.git
      CONTROL_RAW_BASE:  https://raw.githubusercontent.com/Transfermarket-coord/tm-control/main
      COMP_COOLDOWN_S:   '30'
      MAX_MINUTES:       '320'
      QUOTA_LIMIT:       '2000'
      QUOTA_THRESHOLD:   '0.90'
      FORCE_ALL:         ${{ github.event.inputs.force_all || 'false' }}
      PYTHONUNBUFFERED:  '1'

    steps:
      - name: Checkout worker repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Derive ACCOUNT_ID from repo name (TM{N})
        id: derive
        run: |
          ACCOUNT_ID="$(echo "$GITHUB_REPOSITORY" | sed -E 's|.*/TM([0-9]+)$|\1|')"
          if ! [[ "$ACCOUNT_ID" =~ ^[1-9][0-9]?$ ]]; then
            echo "ERROR: could not derive ACCOUNT_ID from $GITHUB_REPOSITORY"
            exit 1
          fi
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Running as ACCOUNT_ID=$ACCOUNT_ID"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Pre-flight — quota self-check
        run: |
          python - <<'PY'
          import json, os, sys, pathlib
          status_file = pathlib.Path("status.json")
          limit     = int(os.environ["QUOTA_LIMIT"])
          threshold = float(os.environ["QUOTA_THRESHOLD"])
          force_all = os.environ.get("FORCE_ALL", "false").lower() == "true"

          used = 0
          if status_file.exists():
              try:
                  used = int(json.loads(status_file.read_text()).get("minutes_used_this_month", 0))
              except Exception:
                  used = 0

          pct = used / limit if limit else 0
          print(f"Quota: {used}/{limit}min ({pct*100:.1f}%)")
          if pct >= threshold and not force_all:
              print(f"⚠ At or above threshold ({threshold*100:.0f}%). Skipping run.")
              print("  Next Saturday's control plane discovery will promote a backup.")
              sys.exit(0)   # clean exit, workflow succeeds
          PY

      - name: Clone tm-control (shared code + assignments)
        run: |
          rm -rf .tm-control
          git clone --depth 1 "$TM_CONTROL_REPO" .tm-control

      - name: Verify assignments.json exists and is non-empty
        run: |
          ASSIGN=.tm-control/assignments.json
          if [[ ! -s "$ASSIGN" ]]; then
            echo "ERROR: $ASSIGN missing or empty. Has control plane run yet?"
            echo "Run discovery workflow on Transfermarket-coord/tm-control first."
            exit 1
          fi
          wc -l "$ASSIGN"

      - name: Pull dcaribou image
        run: docker pull "$DCARIBOU_IMAGE"

      - name: Record run start
        id: timing
        run: |
          echo "start_epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Run daily scrape for ACCOUNT_ID's assignments
        run: |
          bash .tm-control/scripts/worker_scrape_daily.sh
        # worker_scrape_daily.sh is ONE shared script in tm-control; reads:
        #   - $ACCOUNT_ID (env)
        #   - $SEASON, $DCARIBOU_IMAGE, $COMP_COOLDOWN_S, $MAX_MINUTES
        #   - .tm-control/assignments.json
        # Writes:
        #   - data/{comp_id}/{SEASON}/games.jsonl
        #   - data/{comp_id}/{SEASON}/game_lineups.jsonl (incremental, last 7 days)

      - name: Update status.json (record minutes consumed)
        if: always()
        run: |
          END=$(date -u +%s)
          START=${{ steps.timing.outputs.start_epoch }}
          ELAPSED_MIN=$(( (END - START) / 60 ))
          python - <<PY
          import json, pathlib, os, datetime as dt
          f = pathlib.Path("status.json")
          try:
              data = json.loads(f.read_text()) if f.exists() else {}
          except Exception:
              data = {}
          now = dt.datetime.now(dt.timezone.utc)
          data.setdefault("account_id", int(os.environ["ACCOUNT_ID"]))

          # Reset counter at start of new month
          last_month = data.get("last_month", "")
          this_month = now.strftime("%Y-%m")
          if last_month != this_month:
              data["minutes_used_this_month"] = 0
              data["last_month"] = this_month

          data["minutes_used_this_month"] = int(data.get("minutes_used_this_month", 0)) + $ELAPSED_MIN
          data["last_run_at"] = now.isoformat(timespec="seconds")
          data["last_run_minutes"] = $ELAPSED_MIN
          data["last_run_workflow"] = "scrape-daily"
          f.write_text(json.dumps(data, indent=2, sort_keys=True))
          print(f"status.json → {data['minutes_used_this_month']}min used this month")
          PY

      - name: Cleanup ephemeral tm-control clone
        if: always()
        run: rm -rf .tm-control

      - name: Commit data + status
        if: always()
        run: |
          git config user.name  "tm${ACCOUNT_ID}-bot"
          git config user.email "tm${ACCOUNT_ID}-bot@users.noreply.github.com"
          git add data/ status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily: account ${ACCOUNT_ID} season ${SEASON} @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
